<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sun -->
  <circle cx="220" cy="180" r="72" fill="url(#sun)"/>
  <!-- Cloud -->
  <ellipse cx="300" cy="280" rx="120" ry="64" fill="url(#cloud)"/>
  <ellipse cx="230" cy="260" rx="80" ry="56" fill="url(#cloud)"/>
  <ellipse cx="340" cy="260" rx="70" ry="50" fill="url(#cloud)"/>
  <!-- Rain drops -->
  <line x1="240" y1="350" x2="228" y2="395" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
  <line x1="300" y1="350" x2="288" y2="395" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
  <line x1="360" y1="350" x2="348" y2="395" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
</svg>
