# CaiyunWeather API 反向代理配置
# =================================
# 用法：在 Nginx 主配置的 server {} 块中引入此文件
#
#   server {
#       listen 443 ssl;
#       server_name weather.yourdomain.com;
#
#       # SSL 证书配置 ...
#
#       # 静态文件（PWA）
#       root /var/www/my-weather-tool;
#       index index.html;
#
#       # 引入彩云天气 API 代理
#       include /etc/nginx/conf.d/caiyun-proxy.conf;
#
#       location / {
#           try_files $uri $uri/ /index.html;
#       }
#   }
#
# 部署步骤：
# 1. 将 YOUR_TOKEN_HERE 替换为你的彩云天气 API Token
# 2. 将此文件复制到服务器，如 /etc/nginx/conf.d/caiyun-proxy.conf
# 3. 在主配置 server {} 块中 include 此文件
# 4. nginx -t && nginx -s reload

# 彩云天气 API Token（替换为真实值）
set $caiyun_token "YOUR_TOKEN_HERE";

location /api/caiyun/ {
    # 代理到彩云天气 API v2.6，自动注入 token
    # /api/caiyun/lng,lat/realtime → https://api.caiyunapp.com/v2.6/TOKEN/lng,lat/realtime
    proxy_pass https://api.caiyunapp.com/v2.6/$caiyun_token/;

    proxy_set_header Host api.caiyunapp.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 上游 HTTPS SNI
    proxy_ssl_server_name on;

    # 超时设置
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
}
